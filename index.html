<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>techStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container nav-container">
            <div class="logo">
                <h1>Tech<span>Store</span></h1>
            </div>
         <img src="./img/istockphoto-1126678409-612x612.jpg">
            <nav class="nav-menu">
                <ul>
                    <li><a href="#inicio">inicio</a></li>
                    <li><a href="#productos">productos</a></li>
                    <li><a href="#ofertas">ofertas</a></li>
                    <li><a href="#servicios">servicios</a></li>
                    <li><a href="#contacto">contacto</a></li>
                </ul>
            </nav>

            <div class="auth-button">
                <button class="btn-login">Iniciar sesión</button>
            </div>
        </div>
    </header>

    <main>
        <section id="inicio" class="hero">
            <div class="container">
                <h2>Campaña de Invierno</h2>
                <p>descuentos de hasta el 40%.</p>
                <a href="#productos" class="btn-cta">Ver Ofertas</a>
            </div>
        </section>
    </main>

<section class="main-banner">
    <div class="banner-content">
        <a href="#" class="btn-buy">Comprar ahora</a>
    </div>
    <div class="banner-image-container">
        <img src="./img/auriculares.jpg" alt="Ilustración de moda">
        <span class="badge-discount">30% OFF</span>
    </div>
</section>

<section class="featured-products">
    <h2>Productos más vendidos</h2>
    <div class="products-grid">
       
        <article class="product-card">
            <img src="/img/parlantes-logitech-s150-usb-980001004-0.jpg" alt="Producto">
            <h3>parlantes</h3>
            <p class="price">$29.99</p>
            <p class="description">super recomendable, suer potencia.</p>
            <a href="#" class="btn-view">Ver producto</a>
        </article>
        
    </div>
</section>

</body>
</html>
